<!DOCTYPE html>
<html lang="ru">
<head>
  <link rel="icon" href="logo.ico" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>VPN Keys</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
<header class="site-header">
  <div class="logo">
    <img src="logo.png" alt="Логотип" />
    <span class="site-title">JR VPN </span>
  </div>
  <nav class="site-nav">
    <!-- Кнопки можно добавлять сюда -->
    <!-- <button>Настройки</button> -->
  </nav>
</header>


  <h1>Список VPN ключей</h1>

  <div id="vpn-list">Загрузка...</div>

<div class="downloads">
  <h2>VPN Клиенты</h2>
  <p>Выберите приложение для вашего устройства</p>

  <div class="devices">
    <!-- iOS -->
    <div class="device-block">
      <h3>iOS</h3>
      <div class="apps-icons">
        <a href="downloads/ios-app1.ipa" download>
          <img src="icons/ios1.png" alt="App 1 iOS">
          <span>App 1</span>
        </a>
        <a href="downloads/ios-app2.ipa" download>
          <img src="icons/ios2.png" alt="App 2 iOS">
          <span>App 2</span>
        </a>
      </div>
    </div>

    <!-- Android -->
    <div class="device-block">
      <h3>Android</h3>
      <div class="apps-icons">
        <a href="downloads/android-app1.apk" download>
          <img src="icons/android1.png" alt="App 1 Android">
          <span>App 1</span>
        </a>
        <a href="downloads/android-app2.apk" download>
          <img src="icons/android2.png" alt="App 2 Android">
          <span>App 2</span>
        </a>
      </div>
    </div>

    <!-- Windows/MacOS -->
    <div class="device-block">
      <h3>Windows / MacOS</h3>
      <div class="apps-icons">
        <a href="downloads/pc-app1.exe" download>
          <img src="icons/pc1.png" alt="App 1 PC">
          <span>App 1</span>
        </a>
        <a href="downloads/pc-app2.dmg" download>
          <img src="icons/pc2.png" alt="App 2 Mac">
          <span>App 2</span>
        </a>
      </div>
    </div>
  </div>
</div>


  <!-- Firebase SDK -->
  <script type="module" src="script.js"></script>
</body>
</html>
