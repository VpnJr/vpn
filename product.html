<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Товар — Upakovka09</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
/* Галерея — миниатюры горизонтально, без переполнения */
.thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.thumb{width:68px;height:68px;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;flex-shrink:0;transition:border-color .15s}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb.active{border-color:var(--brand);border-width:2px}
.thumb:hover{border-color:var(--brand)}
</style>
</head>
<body>
<header class="header">
  <a href="index.html" class="logo">Upakovka<span>09</span></a>
  <a href="index.html" class="back-link">← В каталог</a>
  <div class="header-contacts">
    <a href="tel:+79380000000" class="hc-item">📞 +7 (938) 000-00-00</a>
    <span class="hc-item hc-time">🕐 9:00–18:00</span>
  </div>
  <button class="cart-btn" onclick="openCart()">🛒 <span class="cart-count-badge cart-badge">0</span></button>
</header>

<div id="bc"></div>
<div id="pw"></div>
<div id="sw"></div>
<div id="rw"></div>

<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-drawer-header"><h2>Корзина <span class="cart-count-badge cart-badge">0</span></h2><button onclick="closeCart()">✕</button></div>
  <div class="cart-drawer-body" id="cart-drawer-body"></div>
  <div class="cart-drawer-footer" id="cart-drawer-footer" style="display:none">
    <div class="cart-drawer-total">Итого: <strong id="cart-total-val">0 ₽</strong></div>
    <a href="checkout.html" class="btn-primary btn-block">Оформить заказ →</a>
  </div>
</div>
<div id="cart-toast" class="cart-toast">✓ Товар добавлен в корзину</div>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/authmodal.js"></script>
<script src="js/cart.js"></script>
<script>
(function(){
  var id = parseInt(new URLSearchParams(location.search).get('id'));
  refreshCartUI();

  function renderPage(){
    var p = getProducts().find(function(x){ return x.id === id; });

    if(!p){
      document.getElementById('pw').innerHTML =
        '<div class="not-found"><h2>Товар не найден</h2>'+
        '<a href="index.html" class="btn-primary" style="margin-top:16px">← В каталог</a></div>';
      return;
    }

    document.title = p.name + ' — Upakovka09';

    var pack = p.packQty || 50;
    var BLAB = {hit:'Хит продаж', new:'Новинка', eco:'Эко', sale:'Скидка'};
    var BCLS = {hit:'badge-hit', new:'badge-new', eco:'badge-eco', sale:'badge-sale'};
    var catLabel = getCatLabel(p.cat, p.subCat);

    // ── Все фото ─────────────────────────────────────────────
    // photos[] — новый формат (массив URL)
    // photo    — старый формат (один URL, fallback)
    var allPhotos = [];
    if(p.photos && p.photos.length){
      allPhotos = p.photos.filter(function(x){ return x && x.length; });
    } else if(p.photo){
      allPhotos = [p.photo];
    }
    // Нет фото — только эмодзи, никаких заглушек
    var hasPhotos = allPhotos.length > 0;

    // Главное изображение
    var mainImgHtml = hasPhotos
      ? '<img src="'+allPhotos[0]+'" id="main-img-el" alt="'+p.name+'" style="width:100%;height:100%;object-fit:cover">'
      : '<span style="font-size:110px;line-height:1">'+p.emoji+'</span>';

    // Миниатюры — только если фото > 1
    var thumbsHtml = '';
    if(allPhotos.length > 1){
      thumbsHtml = '<div class="thumbs" id="thumbs-row">'+
        allPhotos.map(function(src, i){
          return '<div class="thumb'+(i===0?' active':'')+'" onclick="switchPhoto(this,\''+src+'\')">'+
            '<img src="'+src+'" alt="фото '+(i+1)+'">'+
          '</div>';
        }).join('')+
      '</div>';
    }

    // ── Хлебные крошки ───────────────────────────────────────
    document.getElementById('bc').innerHTML =
      '<div class="breadcrumb">'+
        '<a href="index.html">Главная</a> › '+
        '<a href="index.html#catalog">'+catLabel+'</a> › '+
        p.name+
      '</div>';

    // ── Основной блок ────────────────────────────────────────
    document.getElementById('pw').innerHTML =
      '<div class="product-page-wrap">'+

        '<div class="gallery">'+
          '<div class="main-img" id="main-img">'+mainImgHtml+'</div>'+
          thumbsHtml+
        '</div>'+

        '<div class="pinfo">'+
          (p.badge ? '<span class="pbadge '+BCLS[p.badge]+'">'+BLAB[p.badge]+'</span>' : '')+
          '<h1 class="ptitle">'+p.name+'</h1>'+
          '<div class="pmeta">'+p.meta+'</div>'+
          (p.sku ? '<div class="p-sku">Арт. '+p.sku+'</div>' : '')+

          '<div class="pack-info-box">'+
            '<div class="pack-info-row">'+
              '<span class="pack-info-icon">📦</span>'+
              '<div>'+
                '<div class="pack-info-title">В одной упаковке: <strong>'+pack+' шт.</strong></div>'+
                '<div class="pack-info-sub">Заказ кратно '+pack+' шт · Цена за 1 штуку</div>'+
              '</div>'+
            '</div>'+
          '</div>'+

          '<div class="pricebox">'+
            '<div class="price-main" id="price-display">'+p.price.toFixed(2)+' ₽</div>'+
            (p.oldPrice ? '<div class="price-old">'+p.oldPrice.toFixed(2)+' ₽</div>' : '')+
            '<div class="price-per">за 1 штуку</div>'+
            '<div class="price-total">Итого: <strong id="total-display">'+(p.price*pack).toFixed(2)+'</strong> ₽ за <strong id="qty-display">'+pack+'</strong> шт.</div>'+
          '</div>'+

          '<div class="qty-section">'+
            '<div class="qty-section-label">Количество</div>'+
            '<div class="qty-row">'+
              '<div class="qty-ctrl">'+
                '<button onclick="chQty(-1)" id="qty-minus">−</button>'+
                '<input type="number" id="qty-input" value="'+pack+'" min="'+pack+'" step="'+pack+'"'+
                  ' onchange="setQtyDirect(parseInt(this.value)||'+pack+')"'+
                  ' onblur="setQtyDirect(parseInt(this.value)||'+pack+')" />'+
                '<button onclick="chQty(1)">+</button>'+
              '</div>'+
              '<span class="qty-hint">Мин. '+pack+' шт. · шаг '+pack+' шт.</span>'+
            '</div>'+
            '<div class="qty-packs" id="qty-packs">= 1 упаковка</div>'+
          '</div>'+


          '<div class="btn-row">'+
            '<button class="btn-primary btn-big" id="add-btn" onclick="doAdd()">🛒 В корзину</button>'+
            '<button class="btn-wish" id="wish-btn" onclick="this.classList.toggle(\'wished\');this.textContent=this.classList.contains(\'wished\')?\'♥\':\'♡\'">♡</button>'+
          '</div>'+
        '</div>'+

      '</div>';

    // ── Характеристики — только непустые + кастомные
    var specRows = [
      {l:'Материал',   v:p.material},
      {l:'Объём',      v:p.volume},
      {l:'Размер',     v:p.size},
      {l:'В упаковке', v:pack+' шт.'},
    ];
    if(p.specs && Array.isArray(p.specs)){
      p.specs.forEach(function(s){ if(s.l&&s.v) specRows.push(s); });
    }
    var specsHtml = specRows
      .filter(function(s){ return s.v && s.v!=='—' && s.v!==''; })
      .map(function(s){ return '<div class="spec"><div class="spec-l">'+s.l+'</div><div class="spec-v">'+s.v+'</div></div>'; })
      .join('');
    document.getElementById('sw').innerHTML = specsHtml
      ? '<div class="specs-section"><h2 class="section-title">Характеристики</h2><div class="specs-grid">'+specsHtml+'</div></div>'
      : '';

    // ── Похожие товары ───────────────────────────────────────
    var rel = getProducts().filter(function(x){ return x.cat===p.cat && x.id!==p.id; }).slice(0,4);
    if(rel.length){
      document.getElementById('rw').innerHTML =
        '<div class="section"><h2 class="section-title">Похожие товары</h2>'+
        '<div class="products-grid" style="max-width:1100px;margin:0 auto">'+
        rel.map(function(r){
          var rPhotos = (r.photos && r.photos.length) ? r.photos : (r.photo ? [r.photo] : []);
          var ri = rPhotos.length
            ? '<img src="'+rPhotos[0]+'" alt="'+r.name+'">'
            : '<div class="card-emoji">'+r.emoji+'</div>';
          var rpack = r.packQty || 50;
          return '<div class="product-card" onclick="location.href=\'product.html?id='+r.id+'\'">'+
            '<div class="product-img">'+ri+'</div>'+
            '<div class="product-info">'+
              '<div class="product-name">'+r.name+'</div>'+
              '<div class="product-meta">'+r.meta+'</div>'+
              '<div class="product-pack">В пачке: <b>'+rpack+' шт.</b></div>'+
              '<div class="product-price-row"><div class="product-price">'+r.price.toFixed(2)+' ₽</div></div>'+
              '<button class="add-cart-btn" onclick="event.stopPropagation();addToCart('+r.id+','+rpack+');this.textContent=\'✓ Добавлено\';this.classList.add(\'added\');var b=this;setTimeout(function(){b.textContent=\'+ В корзину\';b.classList.remove(\'added\');},1600)">+ В корзину</button>'+
            '</div>'+
          '</div>';
        }).join('')+
        '</div></div>';
    }

    // ── Счётчик количества ───────────────────────────────────
    var qty = pack;

    window.switchPhoto = function(el, src){
      document.querySelectorAll('.thumb').forEach(function(t){ t.classList.remove('active'); });
      el.classList.add('active');
      document.getElementById('main-img').innerHTML =
        '<img src="'+src+'" style="width:100%;height:100%;object-fit:cover" alt="">';
    };

    function applyQty(q){
      qty = Math.max(pack, Math.round(q/pack)*pack);
      var inp = document.getElementById('qty-input');
      if(inp) inp.value = qty;
      document.getElementById('qty-display').textContent = qty;
      var packs = qty/pack;
      var pw = packs===1?'упаковка':packs<5?'упаковки':'упаковок';
      document.getElementById('qty-packs').textContent = '= '+packs+' '+pw;
      document.getElementById('qty-minus').disabled = (qty<=pack);
      document.getElementById('price-display').textContent = p.price.toFixed(2)+' ₽';
      document.getElementById('total-display').textContent = (p.price*qty).toFixed(2);
    }

    window.chQty = function(dir){ applyQty(qty + dir*pack); };
    window.setQtyDirect = function(val){ applyQty(val); };
    window.doAdd = function(){
      addToCart(p.id, qty);
      var btn = document.getElementById('add-btn');
      btn.innerHTML = '✓ Добавлено!';
      btn.style.background = '#16a34a';
      setTimeout(function(){ btn.innerHTML='🛒 В корзину'; btn.style.background=''; }, 1800);
    };

    applyQty(pack);
  }

  renderPage();
  loadProductsFromServer(function(){ renderPage(); });
})();
</script>
</body>
</html>
