<!DOCTYPE html>
<html>

<head>
<title>JR VPN Status</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

.server{
background:#1e293b;
padding:15px;
margin:10px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>JR VPN Servers</h1>

<div id="list">loading...</div>

<script>

async function load(){

const res = await fetch("/api/ping");
const data = await res.json();

let html="";

for(let s of data){

let icon="🔴";

if(s.status=="online"){
icon="🟢";
}

html+=`
<div class="server">

<b>${s.name}</b>

<br>

Status: ${icon}

<br>

Ping: ${s.ping ? s.ping+" ms" : "-"}

</div>
`;

}

document.getElementById("list").innerHTML=html;

}

setInterval(load,5000);

load();

</script>

</body>

</html>
