<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Оформление заказа — Upakovka09</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<header class="header">
  <a href="index.html" class="logo">Upakovka<span>09</span></a>
  <a href="index.html" class="back-link">← В каталог</a>
</header>

<div class="checkout-page">
  <div id="form-sec">
    <div class="checkout-layout">
      <div>
        <h1 class="page-title">Оформление заказа</h1>
        <div class="form-block">
          <h2 class="form-subtitle">📞 Контактные данные</h2>
          <div class="field"><label>Имя</label><input type="text" id="f-name" placeholder="Как к вам обращаться?"/></div>
          <div class="field"><label>Телефон <span class="req">*</span></label>
            <div class="phone-wrap"><span class="phone-prefix">+7</span><input type="tel" id="f-phone" placeholder="(999) 000-00-00" maxlength="15" oninput="fmtPhone(this)"/></div>
            <span class="ferr" id="ph-err">Введите корректный номер</span>
            <span class="fhint">Позвоним для подтверждения заказа</span>
          </div>
        </div>
        <div class="form-block">
          <h2 class="form-subtitle">🚚 Доставка</h2>
          <div class="radio-list">
            <label class="radio-opt"><input type="radio" name="del" value="courier" checked onchange="updDel()"/><div class="ro-info"><b>Курьер</b><span>1–2 рабочих дня</span></div><div class="ro-price">300 ₽</div></label>
            <label class="radio-opt"><input type="radio" name="del" value="pickup" onchange="updDel()"/><div class="ro-info"><b>Самовывоз</b><span>Сегодня, 9:00–18:00</span></div><div class="ro-price green">Бесплатно</div></label>
            <label class="radio-opt"><input type="radio" name="del" value="cdek" onchange="updDel()"/><div class="ro-info"><b>СДЭК / Почта</b><span>3–5 рабочих дней</span></div><div class="ro-price">500 ₽</div></label>
          </div>
          <div class="field" id="addr-f">
            <label>Адрес доставки</label>
            <input type="text" id="f-addr" placeholder="Город, улица, дом, квартира"/>
          </div>
        </div>
        <div class="form-block">
          <h2 class="form-subtitle">💳 Оплата</h2>
          <div class="radio-list">
            <label class="radio-opt"><input type="radio" name="pay" value="cash" checked/><div class="ro-info"><b>💵 Наличными при получении</b></div></label>
            <label class="radio-opt"><input type="radio" name="pay" value="card"/><div class="ro-info"><b>💳 Картой при доставке</b></div></label>
          </div>
        </div>
        <div class="form-block">
          <div class="field"><label>Комментарий</label><textarea id="f-comment" rows="2" placeholder="Позвонить заранее, оставить у двери..."></textarea></div>
        </div>
        <button class="btn-primary btn-block" style="padding:13px;font-size:15px" onclick="submitOrder()">Отправить заказ →</button>
        <p class="fnote">Нажимая кнопку, вы соглашаетесь с обработкой персональных данных</p>
      </div>
      <div>
        <div class="order-summary">
          <h2 class="form-subtitle">Ваш заказ</h2>
          <div id="s-items"></div>
          <div class="srow"><span>Товары</span><span id="s-goods">0 ₽</span></div>
          <div class="srow"><span>Доставка</span><span id="s-del">300 ₽</span></div>
          <div class="srow stotal"><span>Итого</span><span id="s-total">0 ₽</span></div>
        </div>
      </div>
    </div>
  </div>
  <div id="ok-sec" style="display:none" class="success-screen">
    <span class="success-icon">✅</span>
    <h2>Заказ принят!</h2>
    <p id="ok-msg"></p>
    <div class="receipt" id="ok-receipt"></div>
    <a href="index.html" class="btn-primary">Вернуться в каталог →</a>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/authmodal.js"></script>
<script src="js/cart.js"></script>
<script>
var DC={courier:300,pickup:0,cdek:500};
var DL={courier:'Курьер (1–2 дня)',pickup:'Самовывоз',cdek:'СДЭК / Почта (3–5 дней)'};
function getDel(){return document.querySelector('input[name="del"]:checked').value;}
function getPay(){return document.querySelector('input[name="pay"]:checked').value;}
function fmtPhone(el){
  var v=el.value.replace(/\D/g,'').slice(0,10),f='';
  if(v.length>0) f='('+v.slice(0,3);
  if(v.length>=3) f+=') '+v.slice(3,6);
  if(v.length>=6) f+='-'+v.slice(6,8);
  if(v.length>=8) f+='-'+v.slice(8,10);
  el.value=f;
}
function updDel(){
  var d=getDel(),c=DC[d];
  document.getElementById('addr-f').style.display=d==='pickup'?'none':'flex';
  document.getElementById('s-del').textContent=c===0?'Бесплатно':c+' ₽';
  document.getElementById('s-total').textContent=(getCartTotal()+c).toFixed(2)+' ₽';
}
function renderSummary(){
  var cart=getCart(),prods=getProducts();
  document.getElementById('s-items').innerHTML=cart.map(function(item){
    var p=prods.find(function(x){return x.id===item.id;});
    if(!p) return '';
    var img=p.photo?'<img src="'+p.photo+'" alt="'+p.name+'">'
      :'<span style="font-size:18px">'+p.emoji+'</span>';
    return '<div class="s-item">'+
      '<div class="s-item-img">'+img+'</div>'+
      '<div class="s-item-info"><div>'+p.name+'</div><div class="s-item-qty">'+item.qty+' шт. × '+p.price.toFixed(2)+' ₽</div></div>'+
      '<div class="s-item-price">'+(p.price*item.qty).toFixed(2)+' ₽</div>'+
    '</div>';
  }).join('');
  var g=getCartTotal(),d=DC[getDel()];
  document.getElementById('s-goods').textContent=g.toFixed(2)+' ₽';
  document.getElementById('s-total').textContent=(g+d).toFixed(2)+' ₽';
}
function submitOrder(){
  var raw=document.getElementById('f-phone').value.replace(/\D/g,'');
  if(raw.length<10){
    document.getElementById('f-phone').classList.add('error');
    document.getElementById('ph-err').classList.add('show');
    return;
  }
  document.getElementById('f-phone').classList.remove('error');
  document.getElementById('ph-err').classList.remove('show');
  var name=document.getElementById('f-name').value.trim()||'Покупатель';
  var phone='+7 '+document.getElementById('f-phone').value;
  var addr=document.getElementById('f-addr').value.trim();
  var comment=document.getElementById('f-comment').value.trim();
  var del=getDel(),pay=getPay();
  var payL=pay==='cash'?'Наличными':'Картой';
  var dc=DC[del],cart=getCart(),prods=getProducts();
  var goods=getCartTotal(),total=(goods+dc).toFixed(2);
  var orderId='UP-'+Date.now().toString().slice(-5);
  var order={
    id:orderId,time:new Date().toLocaleString('ru-RU'),
    name:name,phone:phone,address:addr,comment:comment,
    delivery:DL[del],payment:payL,
    items:cart.map(function(item){
      var p=prods.find(function(x){return x.id===item.id;});
      return p?{name:p.name,emoji:p.emoji,qty:item.qty,price:p.price}:null;
    }).filter(Boolean),
    total:total,status:'new',
    userId: (getCurrentUser()||{}).uid||null,
    userEmail: (getCurrentUser()||{}).email||null
  };
  // Сохраняем заказ в Firebase (виден на всех устройствах)
  order.createdAt = Date.now();
  saveOrderToFirebase(order, null);
  clearCart();
  document.getElementById('form-sec').style.display='none';
  document.getElementById('ok-sec').style.display='block';
  document.getElementById('ok-msg').textContent='Мы позвоним на '+phone+' для подтверждения.';
  document.getElementById('ok-receipt').innerHTML=
    '<div class="rrow"><span>Номер заказа</span><span>'+orderId+'</span></div>'+
    '<div class="rrow"><span>Телефон</span><span>'+phone+'</span></div>'+
    '<div class="rrow"><span>Доставка</span><span>'+DL[del]+'</span></div>'+
    '<div class="rrow"><span>Оплата</span><span>'+payL+'</span></div>'+
    '<div class="rrow"><span>Сумма</span><span>'+total+' ₽</span></div>';
}
loadProductsFromServer(function(){ renderSummary(); });
renderSummary();
</script>
</body>
</html>
