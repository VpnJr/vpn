<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Личный кабинет — Upakovka09</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
.acc-wrap{max-width:860px;margin:0 auto;padding:32px 1.5rem}
.acc-header{display:flex;align-items:center;gap:20px;margin-bottom:28px;padding:22px 24px;background:#fff;border-radius:var(--rl);border:1.5px solid var(--border)}
.acc-avatar{width:60px;height:60px;background:var(--brand);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#fff;flex-shrink:0}
.acc-info{flex:1;min-width:0}
.acc-info h2{font-size:18px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acc-info p{font-size:13px;color:var(--muted)}
.acc-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:24px}
.acc-tab{padding:10px 22px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:none;font-family:inherit;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.acc-tab:hover{color:#1a1a1a}
.acc-tab.active{color:var(--brand-d);border-bottom-color:var(--brand);font-weight:600}
.acc-pane{display:none}.acc-pane.active{display:block}
/* order cards */
.oh-list{display:flex;flex-direction:column;gap:12px}
.oh-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--rl);overflow:hidden}
.oh-head{padding:11px 16px;background:var(--gray);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.oh-id{font-weight:700;font-size:14px}
.oh-date{font-size:12px;color:var(--muted)}
.oh-body{padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.oh-items{display:flex;flex-wrap:wrap;gap:6px}
.oh-tag{background:var(--gray);border-radius:var(--r);padding:3px 10px;font-size:12px}
.oh-foot{display:flex;align-items:center;justify-content:space-between}
.oh-total{font-size:16px;font-weight:700;color:var(--brand-d)}
.oh-st{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.s-new{background:#fff0ee;color:var(--brand)}.s-proc{background:#fef9c3;color:#854d0e}.s-done{background:#f0fdf4;color:#166534}
/* profile */
.pf-form{background:#fff;border-radius:var(--rl);border:1.5px solid var(--border);padding:24px;max-width:440px}
.pf-form .fg{margin-bottom:16px}
.pf-form label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px}
.pf-form input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;outline:none;font-family:inherit;box-sizing:border-box;transition:border-color .15s}
.pf-form input:focus{border-color:var(--brand)}
.pf-form input:disabled{background:var(--gray);color:var(--muted);cursor:not-allowed}
.empty-box{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-box .ei{font-size:48px;margin-bottom:12px}
/* not-logged */
.not-logged{text-align:center;padding:72px 20px}
.not-logged .icon{font-size:56px;margin-bottom:20px}
.not-logged h2{font-size:22px;margin-bottom:8px}
.not-logged p{color:var(--muted);margin-bottom:28px;font-size:15px}
</style>
</head>
<body>
<header class="header">
  <a href="index.html" class="logo">Upakovka<span>09</span></a>
  <a href="index.html" class="back-link">← В каталог</a>
  <div class="header-right">
    <button class="auth-header-btn" id="auth-btn" onclick="openAuthModal('login')">👤 Войти</button>
    <button class="cart-btn" onclick="openCart()">🛒 <span id="cart-label">Корзина</span></button>
  </div>
</header>

<div class="acc-wrap" id="acc-wrap">
  <div style="text-align:center;padding:60px;color:var(--muted)">⏳</div>
</div>

<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-drawer-header"><h2>Корзина</h2><button onclick="closeCart()">✕</button></div>
  <div class="cart-drawer-body" id="cart-drawer-body"></div>
  <div class="cart-drawer-footer" id="cart-drawer-footer" style="display:none">
    <div class="cart-drawer-total">Итого: <strong id="cart-total-val">0 ₽</strong></div>
    <a href="checkout.html" class="btn-primary btn-block">Оформить заказ →</a>
  </div>
</div>
<div id="cart-toast" class="cart-toast">✓ Добавлено</div>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/authmodal.js"></script>
<script src="js/cart.js"></script>
<script>
refreshCartUI();
updateAuthUI();

var SCLS = {new:'s-new', processing:'s-proc', done:'s-done'};
var SLBL = {new:'Новый', processing:'В обработке', done:'Выполнен'};

function init(){
  var user = getCurrentUser();
  var wrap = document.getElementById('acc-wrap');

  if(!user){
    wrap.innerHTML =
      '<div class="not-logged">' +
        '<div class="icon">👤</div>' +
        '<h2>Войдите в аккаунт</h2>' +
        '<p>Чтобы видеть историю заказов и управлять профилем</p>' +
        '<button class="btn-primary" onclick="openAuthModal(\'login\')">Войти / Регистрация</button>' +
      '</div>';
    return;
  }

  var initial = (user.name||user.email).charAt(0).toUpperCase();
  wrap.innerHTML =
    '<div class="acc-header">' +
      '<div class="acc-avatar">' + initial + '</div>' +
      '<div class="acc-info">' +
        '<h2>' + (user.name||'Покупатель') + '</h2>' +
        '<p>' + user.email + '</p>' +
      '</div>' +
      '<button class="btn bo" style="flex-shrink:0" onclick="logout()">Выйти</button>' +
    '</div>' +
    '<div class="acc-tabs">' +
      '<button class="acc-tab active" onclick="showTab(\'orders\',this)">📦 Мои заказы</button>' +
      '<button class="acc-tab" onclick="showTab(\'profile\',this)">👤 Профиль</button>' +
    '</div>' +
    '<div id="pane-orders" class="acc-pane active"><div style="color:var(--muted);padding:16px">⏳ Загружаем заказы…</div></div>' +
    '<div id="pane-profile" class="acc-pane"></div>';

  loadOrders(user);
  buildProfile(user);
}

function showTab(name, el){
  document.querySelectorAll('.acc-tab').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.acc-pane').forEach(function(p){p.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('pane-'+name).classList.add('active');
}

function loadOrders(user){
  var el = document.getElementById('pane-orders');
  loadUserOrders(user.uid, function(orders){
    if(!orders.length){
      el.innerHTML =
        '<div class="empty-box"><div class="ei">📭</div>' +
        '<p>У вас пока нет заказов</p>' +
        '<a href="index.html" class="btn-primary" style="display:inline-block;margin-top:16px">Перейти в каталог</a></div>';
      return;
    }
    el.innerHTML = '<div class="oh-list">' + orders.map(function(o){
      var items = (o.items||[]).map(function(i){
        return '<span class="oh-tag">' + (i.emoji||'') + ' ' + i.name + ' × ' + i.qty + '</span>';
      }).join('');
      return '<div class="oh-card">' +
        '<div class="oh-head">' +
          '<span class="oh-id">#' + o.id + '</span>' +
          '<div style="display:flex;align-items:center;gap:10px">' +
            '<span class="oh-date">' + (o.time||'') + '</span>' +
            '<span class="oh-st ' + (SCLS[o.status]||'s-new') + '">' + (SLBL[o.status]||'Новый') + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="oh-body">' +
          '<div class="oh-items">' + items + '</div>' +
          '<div class="oh-foot">' +
            '<span class="oh-total">' + o.total + ' ₽</span>' +
            '<span style="font-size:12px;color:var(--muted)">' + (o.delivery||'') + ' · ' + (o.payment||'') + '</span>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('') + '</div>';
  });
}

function buildProfile(user){
  var el = document.getElementById('pane-profile');
  el.innerHTML =
    '<div class="pf-form">' +
      '<div class="fg"><label>Имя</label><input id="pf-name" type="text" value="' + escHtml(user.name||'') + '"/></div>' +
      '<div class="fg"><label>Email</label><input type="email" value="' + escHtml(user.email) + '" disabled/></div>' +
      '<button class="btn-primary" onclick="saveProf()">Сохранить</button>' +
      '<div id="pf-msg" style="margin-top:10px;font-size:13px;display:none"></div>' +
    '</div>';
}

function saveProf(){
  var user = getCurrentUser();
  var name = document.getElementById('pf-name').value.trim();
  if(!name||!user) return;
  user.name = name;
  setCurrentUser(user);
  saveUserProfile(user.uid, {name:name, email:user.email}, function(){
    var m = document.getElementById('pf-msg');
    m.textContent = '✓ Сохранено'; m.style.color='#16a34a'; m.style.display='block';
    setTimeout(function(){m.style.display='none';}, 2500);
    // Обновить шапку
    updateAuthUI();
  });
}

function logout(){
  authLogout();
  location.href = 'index.html';
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

// Если только что зарегистрировались/вошли — показать кабинет
document.addEventListener('DOMContentLoaded', init);

// Слушаем закрытие модалки авторизации — обновить страницу
var _origClose = window.closeAuthModal;
window.closeAuthModal = function(){
  if(_origClose) _origClose();
  setTimeout(init, 100);
};
</script>
</body>
</html>
